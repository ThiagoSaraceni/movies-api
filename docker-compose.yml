services:
  postgres:
    image: postgres:15-alpine
    container_name: movies_postgres
    environment:
      POSTGRES_DB: movies_db
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: pgadmin
    ports:
      - '8888:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
